{% extends 'base.html' %}

{% block title %}Dashboard | Purba Paschim Construction and Suppliers Company Flow{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="cf-page-header">
        <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Dashboard</h1>
                <p class="cf-page-subtitle">KPI overview, trends, and recent activity in one place.</p>
            </div>
            <form
                id="dashboard-filter-form"
                class="grid grid-cols-1 gap-2 sm:grid-cols-3 lg:grid-cols-[9rem_9rem_auto] lg:items-end"
                hx-get="{% url 'dashboard' %}"
                hx-target="#dashboard-content"
                hx-trigger="change delay:300ms, submit"
                hx-indicator="#dashboard-loading"
                hx-push-url="true"
            >
                <label class="form-control min-w-0 lg:w-36">
                    <span class="label-text text-xs">From</span>
                    <input type="{% if calendar_mode_is_bs %}text{% else %}date{% endif %}" name="date_from" value="{{ filters.date_from|default:'' }}" class="input input-bordered input-sm w-full min-w-0 lg:w-36" aria-label="Filter from date" placeholder="{% if calendar_mode_is_bs %}YYYY-MM-DD (BS){% endif %}" title="Date format: {% if calendar_mode_is_bs %}BS{% else %}AD{% endif %}" />
                </label>
                <label class="form-control min-w-0 lg:w-36">
                    <span class="label-text text-xs">To</span>
                    <input type="{% if calendar_mode_is_bs %}text{% else %}date{% endif %}" name="date_to" value="{{ filters.date_to|default:'' }}" class="input input-bordered input-sm w-full min-w-0 lg:w-36" aria-label="Filter to date" placeholder="{% if calendar_mode_is_bs %}YYYY-MM-DD (BS){% endif %}" title="Date format: {% if calendar_mode_is_bs %}BS{% else %}AD{% endif %}" />
                </label>
                <div class="flex items-end min-w-0">
                    <div class="grid w-full grid-cols-2 gap-2 lg:w-auto lg:flex-none">
                        <button type="submit" class="btn btn-primary btn-sm">Apply</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline btn-sm">Reset</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboard-loading" class="htmx-indicator">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
            <div class="cf-kpi-card h-24 flex flex-col justify-between">
                <div class="h-2 w-20 cf-skeleton"></div>
                <div class="h-7 w-28 cf-skeleton"></div>
            </div>
            <div class="cf-kpi-card h-24 flex flex-col justify-between">
                <div class="h-2 w-24 cf-skeleton"></div>
                <div class="h-7 w-32 cf-skeleton"></div>
            </div>
            <div class="cf-kpi-card h-24 flex flex-col justify-between">
                <div class="h-2 w-24 cf-skeleton"></div>
                <div class="h-7 w-28 cf-skeleton"></div>
            </div>
            <div class="cf-kpi-card h-24 flex flex-col justify-between">
                <div class="h-2 w-28 cf-skeleton"></div>
                <div class="h-7 w-32 cf-skeleton"></div>
            </div>
            <div class="cf-kpi-card h-24 flex flex-col justify-between">
                <div class="h-2 w-24 cf-skeleton"></div>
                <div class="h-6 w-14 cf-skeleton"></div>
                <div class="h-2 w-20 cf-skeleton"></div>
            </div>
        </div>
    </div>

    <div id="dashboard-content">
        {% include 'core/partials/dashboard_content.html' %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>
    let dashboardCharts = {
        salesTrend: null,
        incomeExpense: null,
        topPendingCustomers: null,
        topCustomers: null,
        jcbSummary: null,
        tipperSummary: null,
        blocksSummary: null,
        cementSummary: null,
        bambooSummary: null
    };
    let chartResizeObservers = [];
    let dashboardViewportMode = null;

    const chartPalette = {
        ink: '#183153',
        slate: '#3E5C76',
        blue: '#1D70B8',
        cyan: '#3BA99C',
        amber: '#E09F3E',
        coral: '#E36464',
        mint: '#6CC4A1',
        violet: '#7A7EE6'
    };

    function injectChartPolishStyles() {
        if (document.getElementById('cf-chart-polish-styles')) {
            return;
        }
        const style = document.createElement('style');
        style.id = 'cf-chart-polish-styles';
        style.textContent = `
            .cf-chart-shell {
                opacity: 0;
                transform: translateY(10px);
                transition: opacity 380ms ease, transform 380ms ease, box-shadow 220ms ease;
            }
            .cf-chart-shell.cf-chart-shell--ready {
                opacity: 1;
                transform: translateY(0);
            }
            .cf-chart-shell:hover {
                box-shadow: 0 14px 30px -20px rgba(20, 34, 56, 0.35);
            }
        `;
        document.head.appendChild(style);
    }

    function readJsonScript(id) {
        const element = document.getElementById(id);
        if (!element) {
            return null;
        }
        try {
            return JSON.parse(element.textContent);
        } catch (error) {
            return null;
        }
    }

    function numberFrom(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function cleanSeries(values) {
        if (!Array.isArray(values)) {
            return [];
        }
        return values.map((value) => numberFrom(value));
    }

    function formatNprNumber(value, options = {}) {
        const { forceInteger = false } = options;
        const numeric = numberFrom(value);
        const rounded = Number(numeric.toFixed(2));
        const hasFraction = !forceInteger && Math.abs(rounded % 1) > 0;

        return rounded.toLocaleString('en-IN', {
            minimumFractionDigits: hasFraction ? 2 : 0,
            maximumFractionDigits: hasFraction ? 2 : 0
        });
    }

    function formatNpr(value) {
        return `NPR ${formatNprNumber(value)}`;
    }

    function formatNprAxis(value) {
        return formatNprNumber(value, { forceInteger: true });
    }

    function formatCompactAxisValue(value) {
        const numeric = numberFrom(value);
        const absolute = Math.abs(numeric);

        function trimTrailingZero(text) {
            return text.replace(/\.0$/, '');
        }

        if (absolute >= 10000000) {
            return `${trimTrailingZero((numeric / 10000000).toFixed(1))}Cr`;
        }
        if (absolute >= 100000) {
            return `${trimTrailingZero((numeric / 100000).toFixed(1))}L`;
        }
        if (absolute >= 1000) {
            return `${trimTrailingZero((numeric / 1000).toFixed(1))}K`;
        }
        return formatNprNumber(numeric, { forceInteger: true });
    }

    const incomeExpenseBarStyleSpec = {
        animationDuration: 820,
        legend: {
            top: 0,
            textColor: '#31445F',
            selectedMode: true
        },
        grid: { left: 18, right: 18, top: 42, bottom: 22, containLabel: true },
        axis: {
            lineColor: '#D4DFEA',
            labelColor: '#516178',
            splitLineColor: 'rgba(80, 110, 150, 0.12)'
        },
        tooltip: {
            trigger: 'axis',
            axisPointer: 'shadow',
            backgroundColor: 'rgba(15, 23, 42, 0.94)',
            textColor: '#F8FAFC'
        },
        series: {
            barMaxWidth: 28,
            borderRadius: [8, 8, 0, 0],
            emphasisFocus: 'series'
        }
    };

    function buildSharedBarSeries(overrides = {}) {
        const baseItemStyle = { borderRadius: incomeExpenseBarStyleSpec.series.borderRadius };
        const mergedItemStyle = Object.assign({}, baseItemStyle, overrides.itemStyle || {});
        return Object.assign(
            {
                type: 'bar',
                barMaxWidth: incomeExpenseBarStyleSpec.series.barMaxWidth,
                itemStyle: mergedItemStyle,
                emphasis: { focus: incomeExpenseBarStyleSpec.series.emphasisFocus }
            },
            overrides
        );
    }

    function buildSharedBarChartOption(config) {
        const horizontal = Boolean(config.horizontal);
        const categoryAxis = Object.assign(
            {
                type: 'category',
                data: config.labels || [],
                axisLine: { lineStyle: { color: incomeExpenseBarStyleSpec.axis.lineColor } },
                axisLabel: Object.assign({ color: incomeExpenseBarStyleSpec.axis.labelColor }, config.categoryAxisLabel || {})
            },
            config.categoryAxis || {}
        );

        const valueAxis = Object.assign(
            {
                type: 'value',
                splitLine: { lineStyle: { color: incomeExpenseBarStyleSpec.axis.splitLineColor } },
                axisLabel: Object.assign(
                    {
                        color: incomeExpenseBarStyleSpec.axis.labelColor,
                        formatter: config.valueAxisFormatter || ((value) => formatNprAxis(value))
                    },
                    config.valueAxisLabel || {}
                )
            },
            config.valueAxis || {}
        );

        return {
            animationDuration: config.animationDuration || incomeExpenseBarStyleSpec.animationDuration,
            color: config.colors || [chartPalette.mint, chartPalette.coral],
            legend: Object.assign(
                {
                    top: incomeExpenseBarStyleSpec.legend.top,
                    textStyle: { color: incomeExpenseBarStyleSpec.legend.textColor },
                    selectedMode: incomeExpenseBarStyleSpec.legend.selectedMode
                },
                config.legend || {}
            ),
            tooltip: Object.assign(
                {
                    trigger: incomeExpenseBarStyleSpec.tooltip.trigger,
                    axisPointer: { type: incomeExpenseBarStyleSpec.tooltip.axisPointer },
                    backgroundColor: incomeExpenseBarStyleSpec.tooltip.backgroundColor,
                    borderWidth: 0,
                    textStyle: { color: incomeExpenseBarStyleSpec.tooltip.textColor }
                },
                config.tooltip || {}
            ),
            grid: Object.assign({}, incomeExpenseBarStyleSpec.grid, config.grid || {}),
            xAxis: horizontal ? valueAxis : categoryAxis,
            yAxis: horizontal ? categoryAxis : valueAxis,
            series: (config.series || []).map((series) => buildSharedBarSeries(series))
        };
    }

    function applyNprCurrencyFormatting(root = document) {
        root.querySelectorAll('.js-npr-value').forEach((element) => {
            const rawValue = element.dataset.nprValue;
            if (rawValue === undefined) {
                return;
            }
            element.textContent = `NPR ${formatNprNumber(rawValue)}`;
        });
    }

    function applyKpiLabelAccessibility(root = document) {
        root.querySelectorAll('.cf-kpi-card .kpi-label').forEach((label) => {
            const text = (label.textContent || '').trim();
            if (text) {
                label.setAttribute('title', text);
                label.setAttribute('aria-label', text);
            }
            if (!label.hasAttribute('tabindex')) {
                label.setAttribute('tabindex', '0');
            }
        });
    }

    function attachResizeObserver(chart, element) {
        if (!chart || !element || !window.ResizeObserver) {
            return;
        }
        const observer = new ResizeObserver(() => {
            chart.resize();
        });
        observer.observe(element);
        chartResizeObservers.push(observer);
    }

    function registerChart(key, instance, element) {
        dashboardCharts[key] = instance;
        attachResizeObserver(instance, element);
        const shell = element.closest('.cf-chart-shell');
        if (shell) {
            requestAnimationFrame(() => shell.classList.add('cf-chart-shell--ready'));
        }
    }

    function destroyDashboardCharts() {
        chartResizeObservers.forEach((observer) => observer.disconnect());
        chartResizeObservers = [];
        Object.keys(dashboardCharts).forEach((key) => {
            if (dashboardCharts[key]) {
                if (typeof dashboardCharts[key].dispose === 'function') {
                    dashboardCharts[key].dispose();
                } else if (typeof dashboardCharts[key].destroy === 'function') {
                    dashboardCharts[key].destroy();
                }
                dashboardCharts[key] = null;
            }
        });
    }

    function attachBarKeyboardNavigation(chart, element, labels, values, metricLabel = 'Sales') {
        if (!chart || !element || !Array.isArray(labels) || !labels.length) {
            return;
        }

        let activeIndex = 0;
        const maxIndex = Math.max(0, labels.length - 1);

        function focusIndex(index) {
            activeIndex = Math.min(Math.max(index, 0), maxIndex);
            chart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
            chart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: activeIndex });
            chart.dispatchAction({
                type: 'showTip',
                seriesIndex: 0,
                dataIndex: activeIndex,
                position: 'right'
            });

            const amount = formatNpr(values[activeIndex]);
            element.setAttribute('aria-label', `Top customers by ${metricLabel.toLowerCase()} chart. ${labels[activeIndex]} with ${amount}.`);
        }

        element.addEventListener('focus', () => {
            focusIndex(activeIndex);
        });

        element.addEventListener('blur', () => {
            chart.dispatchAction({ type: 'hideTip' });
            chart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
        });

        element.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
                event.preventDefault();
                focusIndex(activeIndex + 1);
                return;
            }
            if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
                event.preventDefault();
                focusIndex(activeIndex - 1);
                return;
            }
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                focusIndex(activeIndex);
            }
        });
    }

    function sanitizeTopCustomers(labels, values, limit = 8) {
        const pairs = (labels || []).map((label, index) => ({
            label,
            value: numberFrom(values[index])
        }));
        return pairs.filter((item) => item.label && item.value > 0).sort((a, b) => b.value - a.value).slice(0, limit);
    }

    function buildSortedCategoryData(labels, values, limit = 10) {
        const pairs = (labels || []).map((label, index) => ({
            name: label || 'Uncategorized',
            value: numberFrom(values[index])
        }));
        const filtered = pairs.filter((item) => item.value > 0).sort((a, b) => b.value - a.value);
        
        if (filtered.length <= limit) {
            return filtered;
        }
        
        const topCategories = filtered.slice(0, limit);
        const otherCategories = filtered.slice(limit);
        const othersTotal = otherCategories.reduce((sum, item) => sum + item.value, 0);
        
        topCategories.push({
            name: `Others (${otherCategories.length})`,
            value: othersTotal
        });
        
        return topCategories;
    }

    function getCategoryColorPalettes() {
        const expenseFirst = [chartPalette.coral, chartPalette.amber, chartPalette.blue, chartPalette.mint, chartPalette.violet, chartPalette.slate, chartPalette.cyan, chartPalette.ink];
        const incomeFirst = [chartPalette.mint, chartPalette.blue, chartPalette.cyan, chartPalette.violet, chartPalette.coral, chartPalette.amber, chartPalette.slate, chartPalette.ink];
        return { expense: expenseFirst, income: incomeFirst };
    }

    function splitIncomeExpense(labels, values) {
        const normalized = (labels || []).map((label, index) => ({
            label,
            value: numberFrom(values[index])
        }));
        const income = [];
        const expense = [];

        normalized.forEach((item) => {
            const isIncome = /income/i.test(String(item.label));
            const isExpense = /expense/i.test(String(item.label));
            income.push(isIncome ? item.value : 0);
            expense.push(isExpense ? item.value : 0);
        });

        if (!income.some(Boolean) && !expense.some(Boolean)) {
            return {
                income: normalized.map((item) => item.value),
                expense: normalized.map(() => 0)
            };
        }

        return { income, expense };
    }

    function splitJcbSeries(labels, values) {
        const income = [];
        const expense = [];
        const hours = [];

        (labels || []).forEach((label, index) => {
            const value = numberFrom(values[index]);
            const text = String(label).toLowerCase();
            income.push(text.includes('income') ? value : null);
            expense.push(text.includes('expense') ? value : null);
            hours.push(text.includes('hour') ? value : null);
        });

        if (!hours.some((value) => value !== null)) {
            hours.splice(0, hours.length, ...(values || []).map(() => null));
        }

        return { income, expense, hours };
    }

    function isCompactViewport() {
        return window.matchMedia && window.matchMedia('(max-width: 1024px)').matches;
    }

    function getDashboardViewportMode() {
        return isCompactViewport() ? 'compact' : 'desktop';
    }

    function initDashboardCharts() {
        if (!window.echarts) {
            return;
        }

        dashboardViewportMode = getDashboardViewportMode();

        injectChartPolishStyles();

        const salesTrendLabels = readJsonScript('sales-trend-labels');
        const salesTrendValues = cleanSeries(readJsonScript('sales-trend-values'));
        const incomeExpenseLabels = readJsonScript('income-expense-labels');
        const incomeExpenseValues = cleanSeries(readJsonScript('income-expense-values'));
        const jcbSummaryLabels = readJsonScript('jcb-summary-labels');
        const jcbSummaryValues = cleanSeries(readJsonScript('jcb-summary-values'));
        const topPendingCustomerLabels = readJsonScript('top-pending-customer-labels');
        const topPendingCustomerValues = cleanSeries(readJsonScript('top-pending-customer-values'));
        const topCustomerLabels = readJsonScript('top-customer-labels');
        const topCustomerValues = cleanSeries(readJsonScript('top-customer-values'));
        const categoryExpenseLabels = readJsonScript('category-expense-labels');
        const categoryExpenseValues = cleanSeries(readJsonScript('category-expense-values'));
        const categoryIncomeLabels = readJsonScript('category-income-labels');
        const categoryIncomeValues = cleanSeries(readJsonScript('category-income-values'));
        const tipperSummaryLabels = readJsonScript('tipper-summary-labels');
        const tipperSummaryValues = cleanSeries(readJsonScript('tipper-summary-values'));
        const blocksSummaryLabels = readJsonScript('blocks-summary-labels');
        const blocksSummaryValues = cleanSeries(readJsonScript('blocks-summary-values'));
        const cementSummaryLabels = readJsonScript('cement-summary-labels');
        const cementSummaryValues = cleanSeries(readJsonScript('cement-summary-values'));
        const bambooSummaryLabels = readJsonScript('bamboo-summary-labels');
        const bambooSummaryValues = cleanSeries(readJsonScript('bamboo-summary-values'));

        const trendCanvas = document.getElementById('sales-trend-chart');
        const pieCanvas = document.getElementById('income-expense-chart');
        const jcbSummaryCanvas = document.getElementById('jcb-summary-chart');
        const topPendingCanvas = document.getElementById('top-pending-customers-chart');
        const topCanvas = document.getElementById('top-customers-chart');
        const categoryExpenseCanvas = document.getElementById('category-expense-chart');
        const categoryIncomeCanvas = document.getElementById('category-income-chart');
        const tipperSummaryCanvas = document.getElementById('tipper-summary-chart');
        const blocksSummaryCanvas = document.getElementById('blocks-summary-chart');
        const cementSummaryCanvas = document.getElementById('cement-summary-chart');
        const bambooSummaryCanvas = document.getElementById('bamboo-summary-chart');
        const compactViewport = isCompactViewport();

        destroyDashboardCharts();

        if (!compactViewport && trendCanvas && salesTrendLabels && salesTrendValues) {
            const salesChart = echarts.init(trendCanvas, null, { renderer: 'canvas' });
            const showZoom = salesTrendLabels.length > 8;
            salesChart.setOption({
                color: [chartPalette.blue],
                animationDuration: 900,
                grid: { left: 18, right: 50, top: 30, bottom: showZoom ? 56 : 24, containLabel: true },
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(15, 23, 42, 0.94)',
                    borderWidth: 0,
                    textStyle: { color: '#F8FAFC' },
                    formatter(params) {
                        const point = params[0];
                        const idx = point.dataIndex;
                        const current = numberFrom(point.value);
                        const previous = idx > 0 ? numberFrom(salesTrendValues[idx - 1]) : 0;
                        const delta = current - previous;
                        const deltaLabel = idx > 0 ? `${delta >= 0 ? '+' : ''}${formatNpr(delta)}` : 'N/A';
                        return `${point.axisValue}<br/>Sales: ${formatNpr(current)}<br/>PoP Change: ${deltaLabel}`;
                    }
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: salesTrendLabels,
                    axisLine: { lineStyle: { color: '#D4DFEA' } },
                    axisLabel: { color: '#516178' }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: 'rgba(80, 110, 150, 0.12)' } },
                    axisLabel: { color: '#516178', formatter: (value) => formatNprAxis(value) }
                },
                dataZoom: showZoom ? [
                    { type: 'inside', start: 0, end: 100 },
                    { type: 'slider', height: 14, bottom: 10, borderColor: 'transparent', fillerColor: 'rgba(29, 112, 184, 0.2)' }
                ] : [],
                series: [{
                    name: 'Sales',
                    type: 'line',
                    smooth: 0.42,
                    symbol: 'circle',
                    symbolSize: 7,
                    lineStyle: {
                        width: 4,
                        color: chartPalette.blue,
                        shadowColor: 'rgba(29, 112, 184, 0.28)',
                        shadowBlur: 16,
                        shadowOffsetY: 7
                    },
                    itemStyle: { color: '#FFFFFF', borderColor: chartPalette.blue, borderWidth: 2 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(29, 112, 184, 0.34)' },
                            { offset: 1, color: 'rgba(59, 169, 156, 0.06)' }
                        ])
                    },
                    markPoint: {
                        symbolSize: 42,
                        itemStyle: { color: '#fff', borderColor: chartPalette.coral, borderWidth: 2 },
                        label: { color: chartPalette.ink, fontWeight: 700, formatter: '{b}' },
                        data: [{ type: 'max', name: 'Max' }, { type: 'min', name: 'Min' }]
                    },
                    markLine: {
                        symbol: 'none',
                        lineStyle: { type: 'dashed', color: chartPalette.amber },
                        label: {
                            color: chartPalette.ink,
                            fontSize: 11,
                            fontWeight: 600,
                            position: 'insideMiddleTop',
                            distance: 6,
                            padding: [2, 7],
                            borderRadius: 8,
                            borderWidth: 1,
                            borderColor: 'rgba(245, 158, 11, 0.32)',
                            backgroundColor: 'rgba(255, 255, 255, 0.94)',
                            formatter: (params) => {
                                const value = numberFrom(params.value);
                                return `Avg ${formatCompactAxisValue(value)}`;
                            }
                        },
                        data: [{ type: 'average', name: 'Avg' }]
                    },
                    data: salesTrendValues
                }]
            });
            registerChart('salesTrend', salesChart, trendCanvas);
        }

        if (pieCanvas && incomeExpenseLabels && incomeExpenseValues) {
            const { income, expense } = splitIncomeExpense(incomeExpenseLabels, incomeExpenseValues);
            const barChart = echarts.init(pieCanvas, null, { renderer: 'canvas' });
            barChart.setOption(buildSharedBarChartOption({
                labels: incomeExpenseLabels,
                colors: [chartPalette.mint, chartPalette.coral],
                tooltip: {
                    formatter(params) {
                        const incomeValue = numberFrom(params.find((item) => item.seriesName === 'Income')?.value);
                        const expenseValue = numberFrom(params.find((item) => item.seriesName === 'Expense')?.value);
                        const net = incomeValue - expenseValue;
                        return `${params[0].axisValue}<br/>Income: ${formatNpr(incomeValue)}<br/>Expense: ${formatNpr(expenseValue)}<br/>Net: ${formatNpr(net)}`;
                    }
                },
                series: [
                    { name: 'Income', data: income },
                    { name: 'Expense', data: expense }
                ]
            }));
            registerChart('incomeExpense', barChart, pieCanvas);
        }

        if (!compactViewport && topPendingCanvas && topPendingCustomerLabels && topPendingCustomerValues) {
            const rankedPending = sanitizeTopCustomers(topPendingCustomerLabels, topPendingCustomerValues, 10);
            const labels = rankedPending.map((item) => item.label);
            const values = rankedPending.map((item) => item.value);
            const total = values.reduce((sum, value) => sum + value, 0);
            const pendingCustomerPalette = ['#1D70B8', '#3BA99C', '#E09F3E', '#E36464', '#7A7EE6', '#3E5C76', '#6CC4A1', '#2C6693', '#355E8A', '#52796F'];
            const pendingBarMaxWidth = labels.length > 8 ? 14 : 18;
            const pendingBarCategoryGap = labels.length > 8 ? '58%' : '44%';

            const topPendingChart = echarts.init(topPendingCanvas, null, { renderer: 'canvas' });
            // Exception: ranking bars remain horizontal with contribution tooltip for readability.
            topPendingChart.setOption(buildSharedBarChartOption({
                horizontal: true,
                animationDuration: 960,
                labels,
                legend: {
                    left: 'left',
                    itemHeight: 10,
                    icon: 'roundRect',
                    data: ['Pending Amount']
                },
                grid: { left: 112, right: 24, top: 42, bottom: 36, containLabel: true },
                valueAxis: {
                    splitNumber: 4,
                    name: 'Pending Amount (NPR)',
                    nameLocation: 'middle',
                    nameGap: 28,
                    nameTextStyle: { color: '#516178', fontWeight: 600 }
                },
                valueAxisLabel: {
                    hideOverlap: true,
                    margin: 10
                },

            topCustomersChart.setOption(buildSharedBarChartOption({
                horizontal: true,
                animationDuration: 960,
                labels,
                legend: {
                    left: 'left',
                    itemHeight: 10,
                    icon: 'roundRect',

                },

                valueAxis: {
                    splitNumber: 4,

            registerChart('topCustomers', topCustomersChart, topCanvas);
            attachBarKeyboardNavigation(topCustomersChart, topCanvas, labels, values, 'Sales');

        if (jcbSummaryCanvas && jcbSummaryLabels && jcbSummaryValues) {
            const jcbSeries = splitJcbSeries(jcbSummaryLabels, jcbSummaryValues);

            const jcbChart = echarts.init(jcbSummaryCanvas, null, { renderer: 'canvas' });

                labels: jcbSummaryLabels,
                colors: [chartPalette.mint, chartPalette.coral],
                animationDuration: 920,
                grid: { left: 18, right: 26, top: 48, bottom: 22, containLabel: true },
                valueAxis: { name: 'NPR' },
                tooltip: {
                    formatter(params) {
                        const lines = [params[0].axisValue];
                        params.forEach((item) => {
                            lines.push(`${item.marker}${item.seriesName}: ${formatNpr(item.value)}`);
                        });
                        return lines.join('<br/>');
                    }
                },
                series: [
                    { name: 'Income', barMaxWidth: 26, data: jcbSeries.income },
                    { name: 'Expense', barMaxWidth: 26, data: jcbSeries.expense }

            registerChart('jcbSummary', jcbChart, jcbSummaryCanvas);

        if (cementSummaryCanvas && cementSummaryLabels && cementSummaryValues) {
            const cementChart = echarts.init(cementSummaryCanvas, null, { renderer: 'canvas' });

        if (bambooSummaryCanvas && bambooSummaryLabels && bambooSummaryValues) {

            registerChart('bambooSummary', bambooChart, bambooSummaryCanvas);

        // Category Expense Pie Chart
        if (!compactViewport && categoryExpenseCanvas && categoryExpenseLabels && categoryExpenseValues) {
            const expenseChartData = buildSortedCategoryData(categoryExpenseLabels, categoryExpenseValues, 10);
            if (expenseChartData.length > 0) {
                const colorPalettes = getCategoryColorPalettes();
                const expensePalette = colorPalettes.expense.slice(0, Math.min(expenseChartData.length, 8));
                const total = expenseChartData.reduce((sum, item) => sum + numberFrom(item.value), 0);
                const expenseChart = echarts.init(categoryExpenseCanvas, null, { renderer: 'canvas' });
                expenseChart.setOption({
                    animationDuration: 900,
                    color: expensePalette,
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(15, 23, 42, 0.94)',
                        borderWidth: 0,
                        textStyle: { color: '#F8FAFC' },
                        formatter(params) {
                            const value = numberFrom(params.value);
                            const pct = total > 0 ? ((value / total) * 100).toFixed(1) : '0.0';
                            return `${params.name}<br/>Expense: ${formatNpr(value)}<br/>Percentage: ${pct}%`;
                        }
                    },
                    legend: {
                        top: 'bottom',
                        textStyle: { color: '#31445F' },
                        orient: 'vertical',
                        right: 10,
                        data: expenseChartData.map((item) => item.name)
                    },
                    series: [{
                        type: 'pie',
                        center: ['38%', '50%'],
                        radius: ['25%', '70%'],
                        avoidLabelOverlap: true,
                        itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },

                        emphasis: {

                        data: expenseChartData
                    }]
                });

        if (!compactViewport && categoryIncomeCanvas && categoryIncomeLabels && categoryIncomeValues) {
            const incomeChartData = buildSortedCategoryData(categoryIncomeLabels, categoryIncomeValues, 10);

                incomeChart.setOption({
                    animationDuration: 900,

                    tooltip: {

                        borderWidth: 0,

                        formatter(params) {

                            const pct = total > 0 ? ((value / total) * 100).toFixed(1) : '0.0';
                            return `${params.name}<br/>Income: ${formatNpr(value)}<br/>Percentage: ${pct}%`;

                    }]

                registerChart('categoryIncome', incomeChart, categoryIncomeCanvas);
            }
        }

        const dashboardRoot = document.getElementById('dashboard-content') || document;
        applyNprCurrencyFormatting(dashboardRoot);
        applyKpiLabelAccessibility(dashboardRoot);
    }

    document.addEventListener('DOMContentLoaded', initDashboardCharts);
    window.addEventListener('resize', () => {
        const nextViewportMode = getDashboardViewportMode();
        if (dashboardViewportMode !== nextViewportMode) {
            initDashboardCharts();
            return;
        }
        Object.values(dashboardCharts).forEach((chart) => {
            if (chart) {
                chart.resize();
            }
        });
    });
    document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.target && event.target.id === 'dashboard-content') {
            initDashboardCharts();
        }
    });
</script>
