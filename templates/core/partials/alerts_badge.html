{% if alerts_badge_count > 0 %}
<span class="badge badge-sm border-0 bg-error text-error-content font-bold min-w-6 justify-center tabular-nums">{{ alerts_badge_count }}</span>
{% else %}
<span class="badge badge-sm border border-base-300 bg-base-100 text-base-content/70 font-semibold min-w-6 justify-center tabular-nums">0</span>
{% endif %}
