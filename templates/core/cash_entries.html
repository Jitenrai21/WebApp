{% extends 'base.html' %}

{% block title %}Cash Entries | Company Flow{% endblock %}

{% block content %}
<div class="space-y-7">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">Cash Entries</h1>
            <p class="text-sm text-base-content/70 mt-1">Track and manage all incoming and outgoing cash records.</p>
        </div>
        <a href="{% url 'transaction_create' %}" class="btn btn-primary">Add Entry</a>
    </div>

    <form
        method="get"
        class="card bg-base-100 border border-base-300 p-4 sm:p-5 grid gap-3 md:grid-cols-2 lg:grid-cols-6"
        hx-get="{% url 'cash_entries' %}"
        hx-target="#transaction-table-container"
        hx-trigger="change, keyup delay:350ms from:input[name='q']"
        hx-push-url="true"
    >
        <label class="form-control lg:col-span-2">
            <span class="label-text mb-1">Search</span>
            <input type="text" name="q" value="{{ filters.q }}" class="input input-bordered w-full" placeholder="Category, description, customer" />
        </label>
        <label class="form-control">
            <span class="label-text mb-1">From</span>
            <input type="date" name="date_from" value="{{ filters.date_from }}" class="input input-bordered w-full" />
        </label>
        <label class="form-control">
            <span class="label-text mb-1">To</span>
            <input type="date" name="date_to" value="{{ filters.date_to }}" class="input input-bordered w-full" />
        </label>
        <label class="form-control">
            <span class="label-text mb-1">Type</span>
            <select name="type" class="select select-bordered w-full">
                <option value="">All</option>
                <option value="income" {% if filters.type == 'income' %}selected{% endif %}>Income</option>
                <option value="expense" {% if filters.type == 'expense' %}selected{% endif %}>Expense</option>
            </select>
        </label>
        <label class="form-control">
            <span class="label-text mb-1">Customer</span>
            <select name="customer" class="select select-bordered w-full">
                <option value="">All</option>
                {% for customer in customers %}
                <option value="{{ customer.id }}" {% if filters.customer == customer.id|stringformat:'s' %}selected{% endif %}>{{ customer.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="form-control">
            <span class="label-text mb-1">Sort</span>
            <select name="sort" class="select select-bordered w-full">
                <option value="-date" {% if filters.sort == '-date' %}selected{% endif %}>Date (Newest)</option>
                <option value="date" {% if filters.sort == 'date' %}selected{% endif %}>Date (Oldest)</option>
                <option value="-amount" {% if filters.sort == '-amount' %}selected{% endif %}>Amount (High)</option>
                <option value="amount" {% if filters.sort == 'amount' %}selected{% endif %}>Amount (Low)</option>
                <option value="customer" {% if filters.sort == 'customer' %}selected{% endif %}>Customer (A-Z)</option>
                <option value="-customer" {% if filters.sort == '-customer' %}selected{% endif %}>Customer (Z-A)</option>
            </select>
        </label>
    </form>

    <div id="transaction-table-container">
        {% include 'core/partials/transaction_table.html' %}
    </div>
</div>
{% endblock %}
